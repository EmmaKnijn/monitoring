version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: kh-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: system_stats
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost", "-ppassword"]
      timeout: 20s
      retries: 10

  api:
    build: ./api
    container_name: kh-api
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DB_USER=root
      - DB_PASSWORD=password
      - DB_HOST=db
      - DB_NAME=system_stats
    depends_on:
      db:
        condition: service_healthy

  agent:
    build: ./agent
    container_name: kh-agent
    restart: always
    environment:
      - API_URL=http://api:5000/api/v1/stats
      - REPORT_INTERVAL=10
      - HOST_HOSTNAME=${HOSTNAME:-local-host}
    depends_on:
      - api

  web:
    build: ./web
    container_name: kh-web
    restart: always
    ports:
      - "8080:8080"
    environment:
      - API_URL=http://api:5000/api/v1/stats
    depends_on:
      - api
